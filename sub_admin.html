<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sub-Admin Console & Gate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --gold: #f59e0b;
            --neon-green: #10b981;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: #f8fafc; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .box-wrapper { width: 100%; max-width: 450px; background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 12px; box-shadow: 0 20px 30px rgba(0,0,0,0.5); }
        .box-title { text-align: center; font-size: 20px; font-weight: 700; color: var(--gold); margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        .form-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; color: #94a3b8; }
        input { background: #0f172a; border: 1px solid var(--border); color: #fff; padding: 11px 14px; border-radius: 6px; font-size: 14px; }
        input:focus { outline: none; border-color: #3b82f6; }
        
        .btn-action { background: #3b82f6; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: 600; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .btn-success { background: var(--neon-green); }
        
        #dashboardArea { display: none; }
    </style>
</head>
<body>

    <div class="box-wrapper">
        <div id="authGateArea">
            <div class="box-title">
                <i class="fa-solid fa-user-shield" style="font-size: 32px;"></i>
                সাব-অ্যাডমিন সিকিউরিটি গেট
            </div>
            <div class="form-group">
                <label>এক্সেস আইডি (Email)</label>
                <input type="email" id="subGateEmail" placeholder="Enter sub-admin email">
            </div>
            <div class="form-group">
                <label>পাসওয়ার্ড</label>
                <input type="password" id="subGatePass" placeholder="Enter password">
            </div>
            <div class="form-group">
                <label>২-স্টেপ ভেরিফিকেশন কোড (মেইন অ্যাডমিনের টোকেন)</label>
                <input type="text" id="subGateToken" placeholder="৬ ডিজিটের কোড দিন" maxlength="6" style="text-align: center; letter-spacing: 4px; font-weight: bold; color: var(--gold);">
            </div>
            <button class="btn-action" onclick="loginSubAdmin()">ভেরিফাই ও প্রবেশ করুন</button>
        </div>

        <div id="dashboardArea">
            <div class="box-title">
                <i class="fa-solid fa-gauge-high" style="color: var(--neon-green); font-size: 32px;"></i>
                সাব-অ্যাডমিন ড্যাশবোর্ড
            </div>
            <p style="text-align: center; font-size: 13px; color: #94a3b8; margin-bottom: 20px;" id="welcomeUser"></p>
            
            <div class="form-group">
                <label>তারিখ সিলেক্ট করুন</label>
                <input type="date" id="subResDate">
            </div>
            <div class="form-group">
                <label>টাইম স্লট (যেমন: 04:00 PM)</label>
                <input type="text" id="subResTime" placeholder="e.g. 02:00 PM">
            </div>
            <div class="form-group">
                <label>পাত্তি (Patti)</label>
                <input type="text" id="subResPatti" placeholder="e.g. 456">
            </div>
            <div class="form-group">
                <label>সিঙ্গেল (Single)</label>
                <input type="text" id="subResSingle" placeholder="e.g. 5">
            </div>
            
            <button class="btn-action btn-success" onclick="subPublishResult()"><i class="fa-solid fa-paper-plane"></i> ফলাফল আপলোড করুন</button>
            <button class="btn-action" style="background:#ef4444; margin-top: 15px;" onclick="location.reload()"><i class="fa-solid fa-right-from-bracket"></i> লগআউট</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

       // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyABwusy3oZXqh3531oJlQorBsUMWxQF08I",
  authDomain: "live-result-b9155.firebaseapp.com",
  databaseURL: "https://live-result-b9155-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "live-result-b9155",
  storageBucket: "live-result-b9155.firebasestorage.app",
  messagingSenderId: "495121483481",
  appId: "1:495121483481:web:8e8bf65c71ea3d31ec60c8",
  measurementId: "G-DFDW40QF87"
};

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('subResDate').valueAsDate = new Date();

        // সাব-অ্যাডমিন লগইন ভেরিফিকেশন গেট লজিক
        window.loginSubAdmin = async function() {
            const email = document.getElementById("subGateEmail").value.trim();
            const password = document.getElementById("subGatePass").value.trim();
            const tokenInput = document.getElementById("subGateToken").value.trim();

            if(!email || !password || !tokenInput) { alert("সব তথ্য পূরণ করা আবশ্যক!"); return; }

            const nodeSafeEmail = email.replace(/\./g, ',');

            try {
                // ডাটাবেস ভেরিফিকেশন ম্যাচ মেকার
                const subSnapshot = await get(ref(db, `subAdmins/${nodeSafeEmail}`));
                if(!subSnapshot.exists()) { alert("এই ইমেইলের কোনো সাব-অ্যাডমিন অস্তিত্ব নেই!"); return; }

                const subData = subSnapshot.val();
                if(subData.password !== password) { alert("ভুল পাসওয়ার্ড!"); return; }

                // ৬ ডিজিটের মাস্টার টোকেন ম্যাচ চেকার
                const tokenSnapshot = await get(ref(db, "config/securityToken"));
                if(tokenInput !== tokenSnapshot.val()) { alert("ভুল সিকিউরিটি ভেরিফিকেশন কোড! মেইন বসের সাথে যোগাযোগ করুন।"); return; }

                // লগইন সফল হলে ড্যাশবোর্ড প্যানেল আনলক
                document.getElementById("authGateArea").style.display = "none";
                document.getElementById("dashboardArea").style.display = "block";
                document.getElementById("welcomeUser").innerText = `অপারেটর আইডি: ${email}`;

            } catch (err) {
                alert("সার্ভার কানেকশন ত্রুটি: " + err.message);
            }
        };

        // সাব-অ্যাডমিন রেজাল্ট রাইটিং ইঞ্জিন
        window.subPublishResult = function() {
            const date = document.getElementById("subResDate").value;
            const time = document.getElementById("subResTime").value.trim();
            const patti = document.getElementById("subResPatti").value.trim();
            const single = document.getElementById("subResSingle").value.trim();

            if(!date || !time) { alert("তারিখ ও টাইম দিন!"); return; }

            // হুবহু মেইন ডাটাবেস পাথে ডাটা রাইট হবে
            set(ref(db, `results/${date}/${time}`), { patti: patti, single: single })
            .then(() => {
                alert(`সফলভাবে টাইম স্লট ${time}-এর রেজাল্ট আপলোড হয়েছে!`);
                document.getElementById("subResTime").value = "";
                document.getElementById("subResPatti").value = "";
                document.getElementById("subResSingle").value = "";
            }).catch(err => alert("ডাটা আপলোডে ব্যর্থ: " + err.message));
        };
    </script>
</body>
</html>
