<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY GOLD - Premium Play Zone</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --gold: #fbbf24; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: white; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .play-box { background: var(--panel); width: 100%; max-width: 450px; padding: 30px; border-radius: 12px; border: 2px solid var(--gold); text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin-top: 12px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; }
        button { background: var(--gold); color: black; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #f59e0b; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>
    <div class="play-box">
        <h2 style="color:var(--gold);">BOMBAY GOLD PLAY ZONE</h2>
        <div id="play-toast" style="display:none; padding:10px; margin-top:10px; background:#10b981; border-radius:6px; font-weight:bold;"></div>

        <div id="play-auth-screen">
            <input type="text" id="player-name" placeholder="আপনার নাম লিখুন...">
            <input type="password" id="player-pin" placeholder="৪ ডিজিটের পিন নম্বর দিন..." maxlength="4">
            <button id="btn-request-otp">REQUEST ACCESS CODE</button>

            <div id="otp-input-area" style="display:none; margin-top:20px; border-top:1px solid #334155; padding-top:15px;">
                <input type="text" id="player-otp" placeholder="এডমিন থেকে পাওয়া কোডটি দিন" maxlength="4" style="text-align:center; letter-spacing:4px; font-size:18px;">
                <button id="btn-verify-login" style="background:#10b981; color:white;">VERIFY & ENTER GAME</button>
            </div>
        </div>

        <div id="play-main-board" style="display:none; margin-top:20px;">
            <h3 id="display-player-name" style="color:#fff;">Welcome Player</h3>
            <div style="background:#0f172a; padding:15px; border-radius:8px; margin: 15px 0; border:1px solid #334155;">
                <span style="color:#94a3b8; font-size:14px;">AVAILABLE BALANCE</span>
                <h2 id="player-wallet-display" style="color:#10b981; margin-top:5px;">0.00 PTS</h2>
            </div>

            <select id="play-slot-select"></select>

            <div class="grid">
                <input type="text" id="play-single-num" placeholder="Single (0-9)" maxlength="1" style="text-align:center;">
                <input type="number" id="play-single-points" placeholder="Points">
            </div>
            <div class="grid">
                <input type="text" id="play-patti-num" placeholder="Patti (3 Dig)" maxlength="3" style="text-align:center;">
                <input type="number" id="play-patti-points" placeholder="Points">
            </div>

            <button id="btn-submit-bet" style="background:#2563eb; color:white; margin-top:20px;">LOCK BET ROW 🚀</button>
            <button id="btn-player-logout" style="background:#ef4444; color:white; font-size:14px; padding:6px; margin-top:20px;">Logout</button>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
