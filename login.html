<input type="password" id="pass" placeholder="পাসওয়ার্ড">
<button onclick="check()">প্রবেশ</button>
<script>
    function check() {
        let p = document.getElementById('pass').value;
        if(p === "admin123") window.location.href = "admin.html";
        else if(p === "sub123") window.location.href = "sub-admin.html";
        else alert("ভুল পাসওয়ার্ড!");
    }
</script>
