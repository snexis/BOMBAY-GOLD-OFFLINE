<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>BOMBAY-GOLD</title>
    <style>
        body { background: #0b1120; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: #facc15; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 প্লেয়ার লগইন</h2>
        <input type="text" id="name" placeholder="আপনার নাম">
        <input type="password" id="pin" placeholder="পিন (৪ ডিজিট)">
        <button onclick="alert('কানেকশন চেক করুন!')">লগইন রিকোয়েস্ট</button>
    </div>
</body>
</html>
