<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Game Interface Structure</title>
    <style>
        body { display: flex; font-family: sans-serif; margin: 0; background: #f0f0f0; }
        .sidebar { width: 200px; background: #333; color: white; height: 100vh; }
        .main-content { flex: 1; padding: 20px; }
        .bet-panel { width: 250px; background: #ddd; height: 100vh; }
        
        /* SINGLE Section Styles */
        .single-section { background: white; padding: 15px; border: 2px solid #000; margin-bottom: 20px; }
        .tabs { margin-top: 10px; display: flex; gap: 10px; }
        .tab-btn { padding: 8px 15px; cursor: pointer; border: 1px solid #000; }
        
        /* Grid Structure */
        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-top: 15px; }
        .column { border: 1px solid #999; padding: 5px; text-align: center; }
        .header-val { font-weight: bold; padding-bottom: 5px; border-bottom: 1px solid #000; }
        .party-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; margin-top: 5px; }
        .party-btn { font-size: 10px; padding: 2px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- বাম পাশের Menu -->
    <div class="sidebar">Menu</div>

    <!-- মাঝের মূল সেকশন -->
    <div class="main-content">
        
        <!-- SINGLE সেকশন -->
        <div class="single-section">
            <h3>SINGLE</h3>
            <div class="tabs">
                <button class="tab-btn">BOTH</button>
                <button class="tab-btn">DIGIT</button>
                <button class="tab-btn">WORD</button>
            </div>

            <!-- ২২টি পার্টিসহ কলাম -->
            <div class="grid-container" id="grid">
                <!-- ১২০টি ব্লকের বদলে এখন ১০টি কলাম, প্রতিটিতে ২২টি পার্টি -->
                <script>
                    const headers = ["1/A", "2/B", "3/C", "4/D", "5/E", "6/F", "7/G", "8/H", "9/I", "0/J"];
                    for (let i = 0; i < 10; i++) {
                        document.write(`<div class="column">
                            <div class="header-val">${headers[i]}</div>
                            <div class="party-list">`);
                        for (let j = 1; j <= 22; j++) {
                            document.write(`<button class="party-btn">${j}</button>`);
                        }
                        document.write(`</div></div>`);
                    }
                </script>
            </div>
        </div>
    </div>

    <!-- ডান পাশের Bet Panel -->
    <div class="bet-panel">Bet Panel</div>

</body>
</html>
