<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2Z Game Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        
        <!-- Header Controls -->
        <header class="top-header">
            <div class="user-info">
                <span>Player: <strong id="profileName">Admin User</strong></span>
                <span id="currentDateTime"></span>
            </div>
            <div class="points-bar">
                <span>Play Points: <strong id="playPoints">5,000 Pts</strong></span>
                <span>Winning Points: <strong id="winningPoints">1,200 Pts</strong></span>
            </div>
        </header>

        <!-- Board Sections Container -->
        <div class="board-section">
            
            <!-- SECTION 1 -->
            <h2 class="section-title">SECTION 1: SINGLE MODE</h2>
            <div id="singleGrid" class="single-grid"></div>

            <!-- SECTION 2 -->
            <h2 id="tripleBoardHeader" class="section-title">SECTION 2: TRIPLE MAIN BOARD (220 BLOCKS)</h2>
            
            <!-- 10-Column Container -->
            <div id="pattiVerticalContainer" class="patti-container"></div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
