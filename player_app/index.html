<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2Z BOMBAY - Offline Gaming System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Auth Modal / Admin Login -->
    <div id="login-modal" class="modal-overlay">
        <div class="login-card">
            <h2>A2Z BOMBAY LOGIN</h2>
            <p>অ্যাডমিন বা প্লেয়ার আইডি নির্বাচন করুন</p>
            <form id="login-form">
                <div class="form-group">
                    <label>ইউজার টাইপ:</label>
                    <select id="user-type">
                        <option value="demo">Demo Player (টেস্টিং মোড)</option>
                        <option value="admin">System Admin (অ্যাডমিন প্যানেল)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ইউজার আইডি:</label>
                    <input type="text" id="username" value="DEMO_PLAYER_01" required>
                </div>
                <div class="form-group">
                    <label>পাসওয়ার্ড:</label>
                    <input type="password" id="password" value="123456" required>
                </div>
                <button type="submit" class="btn-submit">লগইন করুন</button>
            </form>
        </div>
    </div>

    <!-- Main Dashboard Container -->
    <div id="app-container" class="hidden">
        <!-- Top Animated Header -->
        <header class="top-header">
            <div class="brand-title">
                <span class="glow-text">A2Z BOMBAY</span>
            </div>
            
            <!-- Live Result Widget -->
            <div class="live-result-box">
                <div class="result-title">LIVE RESULT (<span id="current-date-display">---</span>)</div>
                <div class="result-value" id="top-result-display">100 AXZ</div>
            </div>

            <!-- User Info Bar -->
            <div class="user-info">
                <span class="user-badge" id="display-user">Player: DEMO</span>
                <span class="points-badge">Play Points: <strong id="play-points">5,000</strong></span>
                <span class="points-badge win">Win Points: <strong id="win-points">1,200</strong></span>
                <button id="logout-btn" class="btn-logout">Logout</button>
            </div>
        </header>

        <!-- Main Body Placeholder -->
       <!-- Main Body Content -->
        <main class="main-content">

            <!-- MODULE 2 START: MODE CONTROLLER & SINGLE PANEL -->
            
            <!-- View Mode Controllers Bar -->
            <div class="control-panel">
                <div class="mode-selector">
                    <span class="label-text">View By:</span>
                    <button class="btn-mode active" id="btn-mode-both" onclick="switchViewMode('BOTH')">Both</button>
                    <button class="btn-mode" id="btn-mode-word" onclick="switchViewMode('WORD')">Word</button>
                    <button class="btn-mode" id="btn-mode-digit" onclick="switchViewMode('DIGIT')">Digit</button>
                </div>
            </div>

            <!-- SECTION 1: SINGLE MODE BOARD -->
            <div class="board-section">
                <div class="section-header">SECTION 1: SINGLE MODE</div>
                <div class="single-grid" id="single-board-grid">
                    <!-- JavaScript dynamically builds 1-0 Single Cells here -->
                </div>
            </div>

            <!-- MODULE 2 END -->
<!-- MODULE 3 START: TRIPLE MAIN BOARD & RANGE SELECTOR -->
            
            <div class="board-section triple-board-container">
                
                <!-- Board Top Bar: Header & Range Filters -->
                <div class="triple-board-bar">
                    <div class="section-header">SECTION 2: TRIPLE MAIN BOARD (220 BLOCKS)</div>
                    
                    <!-- 4-Range Selectors (55 Blocks Each) -->
                    <div class="range-selector">
                        <span class="label-text">NUMBER RANGE:</span>
                        <button class="btn-range active" id="btn-range-all" onclick="filterRange('ALL')">ALL (220)</button>
                        <button class="btn-range" id="btn-range-a" onclick="filterRange('A')">A (1-55)</button>
                        <button class="btn-range" id="btn-range-b" onclick="filterRange('B')">B (56-110)</button>
                        <button class="btn-range" id="btn-range-c" onclick="filterRange('C')">C (111-165)</button>
                        <button class="btn-range" id="btn-range-d" onclick="filterRange('D')">D (166-220)</button>
                    </div>
                </div>

                <!-- 10 Columns Top Headers (1 to 0) -->
                <div class="triple-grid-header">
                    <div class="col-head">1</div>
                    <div class="col-head">2</div>
                    <div class="col-head">3</div>
                    <div class="col-head">4</div>
                    <div class="col-head">5</div>
                    <div class="col-head">6</div>
                    <div class="col-head">7</div>
                    <div class="col-head">8</div>
                    <div class="col-head">9</div>
                    <div class="col-head">0</div>
                </div>

                <!-- 220 Blocks Main Matrix Grid -->
                <div class="triple-grid" id="triple-board-grid">
                    <!-- JavaScript dynamically builds 220 Patti Cells here -->
                </div>

            </div>

            <!-- MODULE 3 END -->
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
