<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY GOLD - Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">
    <div class="container admin-container">
        <header class="main-header">
            <h1 class="logo-text">BOMBAY GOLD</h1>
            <p class="bengali-notice">লাইভ গেম রেজাল্ট এবং সেটিংস কন্ট্রোল প্যানেল</p>
        </header>

        <div class="admin-box">
            <h2>Live Results Management (রেজাল্ট ইনপুট করুন)</h2>
            <div class="form-group">
                <label>তারিখ সিলেক্ট করুন (Date):</label>
                <input type="date" id="result-date" required>
            </div>

            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Time Slot</th>
                            <th>৩ সংখ্যার পাত্তি (Patti)</th>
                            <th>১ সংখ্যার সিঙ্গেল (Single)</th>
                        </tr>
                    </thead>
                    <tbody id="admin-inputs-body">
                        <!-- জাভাস্ক্রিপ্ট থেকে লোড হবে -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="admin-box">
            <h2>Website Header & Link Management</h2>
            <div class="form-group">
                <label>বাংলা সাবটাইটেল টেক্সট:</label>
                <input type="text" id="input-subtitle" value="লাইভ গেম রেজাল্ট সবথেকে প্রথম পাওয়ার জন্য ভিジット করুন এই সাইট এ।">
            </div>
            <div class="form-group">
                <label>চলন্ত লেখা (Marquee Text):</label>
                <input type="text" id="input-marquee" value="আজকের অফার আপডেট এর জন্য অপেক্ষা করুন...">
            </div>
            <div class="form-group">
                <label>Tips Button URL (লিংক):</label>
                <input type="url" id="input-tips-url" placeholder="https://example.com/tips">
            </div>
            <div class="form-group">
                <label>Patti Chart Button URL (লিংক):</label>
                <input type="url" id="input-patti-url" placeholder="https://example.com/patti">
            </div>
        </div>

        <div class="admin-actions">
            <button type="button" id="btn-publish" class="btn-publish">PUBLISH LIVE</button>
        </div>
        
        <div id="status-message" class="status-msg"></div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
