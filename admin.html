<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY GOLD - Admin Control Center</title>
    <style>
        :root { --bg: #0b0e14; --card: #151921; --border: #252d3a; --gold: #d4af37; --blue: #2563eb; --text-main: #e2e8f0; --text-dim: #94a3b8; --green: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 20px; display: flex; justify-content: center; min-height: 100vh; line-height: 1.6; }
        .admin-box { width: 100%; max-width: 850px; background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { font-size: 20px; color: var(--gold); margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; text-transform: uppercase; letter-spacing: 1px; }
        .panel-card { background: #1a1f29; border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 25px; }
        .panel-card h3 { font-size: 15px; margin-bottom: 15px; color: #f8fafc; display: flex; align-items: center; gap: 10px; border-left: 3px solid var(--gold); padding-left: 8px; }
        input, select { width: 100%; padding: 12px; background: #0f1218; border: 1px solid var(--border); border-radius: 6px; color: white; margin-top: 5px; }
        button { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; margin-top: 15px; }
        button:hover { opacity: 0.9; }
        .success-btn { background: var(--green) !important; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h2>BOMBAY GOLD - Control Room</h2>

        <div class="panel-card">
            <h3>⚙️ মাস্টার সিস্টেম কন্ট্রোল</h3>
            <button id="btn-sys-toggle" style="background:#dc2626;">SCREEN OFF</button>
            <input type="text" id="off-msg" placeholder="অফ মেসেজ (ফাঁকা রাখলে শুধু লোগো দেখাবে)">
            <p style="margin-top:10px;">লাইভ টাইমার: <span id="live-timer" style="color:var(--gold);">00:00</span></p>
            <p style="margin-top:10px;">স্টাফ লগইন ওটিপি: <span id="otp-display" style="color:var(--gold); font-weight:bold;">XXXX</span></p>
            <button onclick="generateOTP()">জেনারেট নতুন ওটিপি</button>
        </div>

        <div class="panel-card">
            <h3>📊 বিট অ্যানালিটিক্স ও পেমেন্ট ক্যালকুলেটর</h3>
            <select id="payout-percent">
                <option value="10">10%</option> <option value="30">30%</option> <option value="50">50%</option> <option value="100">100%</option>
            </select>
            <button style="background:var(--gold); color:black;" onclick="calculatePayout()">CALCULATE PAYOUT</button>
            <p id="calc-result" style="margin-top:10px;"></p>
        </div>

        <div class="panel-card">
            <h3>✍️ রেজাল্ট এন্ট্রি</h3>
            <button id="res-btn" onclick="markResultDone(this)">SUBMIT RESULT</button>
            <button style="background:#475569;">PREVIOUS RESULTS</button>
        </div>

        <div id="admin-main-content"></div>
    </div>

    <script>
        // ওটিপি জেনারেটর
        function generateOTP() {
            const otp = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('otp-display').innerText = otp;
        }

        // রেজাল্ট সাবমিট (ডবল টিক)
        function markResultDone(btn) {
            btn.innerHTML = "Submitted ✔✔";
            btn.classList.add('success-btn');
        }

        // পেমেন্ট ক্যালকুলেটর
        function calculatePayout() {
            const percent = document.getElementById('payout-percent').value;
            document.getElementById('calc-result').innerText = "পেমেন্ট পার্সেন্টেজ: " + percent + "% সেট করা হয়েছে।";
        }

        // টাইমার
        let timeLeft = 300; 
        setInterval(() => {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('live-timer').innerText = m + ":" + (s < 10 ? '0' : '') + s;
            if(timeLeft > 0) timeLeft--;
        }, 1000);
    </script>
</body>
</html>
