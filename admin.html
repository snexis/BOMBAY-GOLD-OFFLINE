<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
font-family:sans-serif;
background:#111;
color:white;
padding:20px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
}

button{
padding:15px;
background:red;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>
<body>

<h1>Admin Panel</h1>

<input id="cmm" placeholder="CMM Result">
<input id="lff" placeholder="LFF Result">
<input id="mumbai" placeholder="Mumbai Result">

<button onclick="saveResult()">Save Result</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDS5w8TPFVLoy1i-RFJlRaCY_8LG9Xmpuw",
authDomain: "liveresultboard.firebaseapp.com",
databaseURL: "https://liveresultboard-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "liveresultboard",
storageBucket: "liveresultboard.firebasestorage.app",
messagingSenderId: "464276956164",
appId: "1:464276956164:web:68a0c1b7648e8d9f45c151"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveResult = function(){

const cmm = document.getElementById("cmm").value;
const lff = document.getElementById("lff").value;
const mumbai = document.getElementById("mumbai").value;

set(ref(db,"results"),{
cmm:cmm,
lff:lff,
mumbai:mumbai
});

alert("Result Updated Successfully");

}

</script>

</body>
</html>
