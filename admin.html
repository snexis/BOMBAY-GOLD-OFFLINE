<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY GOLD - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

    <div id="admin-auth-screen" class="auth-wrapper">
        <h2>Security Navigation Lock</h2>
        <p>control প্যানেলে প্রবেশ করতে সঠিক পাসওয়ার্ড দিন:</p>
        <div class="form-group">
            <input type="password" id="admin-password" placeholder="পাসওয়ার্ড লিখুন" style="text-align: center;">
        </div>
        <button id="btn-login" class="btn-publish">লগইন করুন</button>
    </div>

    <div id="admin-main-content" class="container" style="display: none;">
        <header class="admin-header-bar">
            <div>
                <h1 class="admin-logo">BOMBAY GOLD</h1>
                <span id="admin-role-badge" class="role-badge">ROLE: ADMIN</span>
            </div>
            <button id="btn-logout" class="btn-logout">Logout</button>
        </header>

        <div id="status-message" class="status-msg"></div>

        <div class="admin-box">
            <div class="box-header">Live Results & Time Customization</div>
            <div class="form-group" style="max-width: 250px; margin: 10px 0;">
                <label>তারিখ সিলেক্ট করুন (Date):</label>
                <input type="date" id="result-date" required>
            </div>

            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Time Slot</th>
                            <th>৩ সংখ্যার পাত্তি (Patti)</th>
                            <th>১ সংখ্যার সিঙ্গেল (Single)</th>
                        </tr>
                    </thead>
                    <tbody id="admin-inputs-body">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="master-settings-box" class="admin-box" style="display: none;">
            <div class="box-header master-color">★ Website Smart Settings & Passwords (Master Only)</div>
            
            <div class="admin-grid-inputs">
                <div class="form-group">
                    <label><b>Website Status (অন/অফ কন্ট্রোল):</b></label>
                    <select id="input-live-status" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1; background: #fffbeb; font-weight: bold;">
                        <option value="live">🟢 LIVE NOW (সব চার্ট ও রেজাল্ট চালু থাকবে)</option>
                        <option value="off">🔴 TODAY OFF (চার্ট গায়েব হবে, স্ক্রিন ব্ল্যাঙ্ক থাকবে)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>জরুরি লাল নোটিফিকেশন বার:</label>
                    <input type="text" id="input-alert" placeholder="ফাঁকা রাখলে হাইড থাকবে">
                </div>
                <div class="form-group">
                    <label>ব্যাকগ্রাউন্ড ইমেজ লিঙ্ক (URL):</label>
                    <input type="url" id="input-bg-url" placeholder="https://example.com/bg.jpg">
                </div>
                <div class="form-group">
                    <label>বাংলা সাবটাইটেল টেক্সট:</label>
                    <input type="text" id="input-subtitle">
                </div>
                <div class="form-group">
                    <label>চলন্ত লেখা (Marquee Text):</label>
                    <input type="text" id="input-marquee">
                </div>
                <div class="form-group">
                    <label>Tips Button URL:</label>
                    <input type="url" id="input-tips-url">
                </div>
                <div class="form-group">
                    <label>Patti Chart Button URL:</label>
                    <input type="url" id="input-patti-url">
                </div>
            </div>

            <div style="background: #f8fafc; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #e2e8f0;">
                <h4 style="margin: 0 0 10px 0; color: #1f78c1;">🔒 Live Security Password Manager</h4>
                <div class="admin-grid-inputs">
                    <div class="form-group">
                        <label>Master Admin Password:</label>
                        <input type="text" id="input-master-pass" placeholder="Default: 777#7">
                    </div>
                    <div class="form-group">
                        <label>Staff Password (Results Only):</label>
                        <input type="text" id="input-staff-pass" placeholder="Default: 12@34">
                    </div>
                </div>
            </div>
        </div>

        <button type="button" id="btn-publish" class="btn-publish" style="margin-top: 10px;">PUBLISH LIVE</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
