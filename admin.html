<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>BOMBAY GOLD | Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>⚙️ ইন্টারফেস সেটিংস</h2>
            <input type="text" id="headerTitle" placeholder="হেডার নাম পরিবর্তন করুন">
            <button class="btn" onclick="updateInterface('header', document.getElementById('headerTitle').value)">আপডেট হেডার</button>
        </div>

        <div class="card">
            <h2>📊 রেজাল্ট পাবলিশ</h2>
            <input type="text" id="resTime" placeholder="টাইম (যেমন: 10:20 AM)">
            <input type="text" id="resPatti" placeholder="পাত্তি">
            <input type="text" id="resVal" placeholder="রেজাল্ট">
            <button class="btn" onclick="publishResult(document.getElementById('resTime').value, document.getElementById('resPatti').value, document.getElementById('resVal').value)">পাবলিশ করুন</button>
        </div>

        <div class="card">
            <h2>👑 সাব-অ্যাডমিন তৈরি</h2>
            <input type="text" id="subAdminUser" placeholder="সাব-অ্যাডমিন ইউজারনেম">
            <button class="btn">নতুন সাব-অ্যাডমিন যোগ করুন</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
