<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOMBAY GOLD - Professional Admin Control Panel</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --accent-color: #e2b842;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
    body { background-color: var(--bg-primary); color: var(--text-main); padding: 20px; }

    /* Login Overlay */
    #login-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-primary); display: flex; justify-content: center; align-items: center; z-index: 9999;
    }
    .login-box {
      background: var(--bg-secondary); padding: 40px; border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 100%; max-width: 400px;
      border: 1px solid rgba(226, 184, 66, 0.2);
    }
    .login-box h2 { color: var(--accent-color); margin-bottom: 20px; }
    .login-box input {
      width: 100%; padding: 12px; margin: 15px 0; background: #0f172a; border: 1px solid #334155;
      color: #fff; border-radius: 6px; text-align: center; font-size: 16px; letter-spacing: 2px;
    }

    /* Dashboard Layout */
    .dashboard-container { max-width: 1100px; margin: 0 auto; display: none; }
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px; background: var(--bg-secondary); border-radius: 12px; margin-bottom: 25px;
      border-bottom: 3px solid var(--accent-color);
    }
    header h1 { color: var(--accent-color); font-size: 24px; display: flex; align-items: center; gap: 10px; }
    
    .grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 25px; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--bg-secondary); padding: 25px; border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid #334155; height: fit-content;
    }
    .card h3 { font-size: 18px; margin-bottom: 20px; color: var(--accent-color); display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #334155; padding-bottom: 10px; }

    /* Form Elements */
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
    .form-group input, .form-group textarea {
      width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155;
      color: #fff; border-radius: 6px; font-size: 14px; transition: 0.3s;
    }
    .form-group input:focus { border-color: var(--accent-color); outline: none; }

    /* Buttons */
    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: 600;
      cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px;
    }
    .btn-primary { background: var(--accent-color); color: #000; }
    .btn-primary:hover { background: #d4a733; }
    .btn-danger { background: var(--danger); color: white; margin-top: 15px; }
    
    /* Toggle Switch */
    .status-container { display: flex; align-items: center; justify-content: space-between; background: #0f172a; padding: 15px; border-radius: 8px; }
    .status-text { font-weight: 600; }
    .status-live { color: var(--success); }
    .status-off { color: var(--danger); }
  </style>
</head>
<body>

  <div id="login-overlay">
    <div class="login-box">
      <i class="fa-solid fa-shield-halved style" style="font-size: 48px; color: var(--accent-color); margin-bottom: 15px;"></i>
      <h2>সিকিউরিটি ভেরিফিকেশন</h2>
      <p style="color: var(--text-muted); font-size: 13px;">অ্যাডমিন প্যানেলে প্রবেশের জন্য সিকিউরিটি পিন দিন</p>
      <input type="password" id="master-pin" placeholder="••••" maxlength="6">
      <button class="btn btn-primary" onclick="verifyPin()">কনফার্ম করুন <i class="fa-solid fa-arrow-right"></i></button>
      <p id="login-error" style="color: var(--danger); margin-top: 10px; font-size: 14px; display: none;">ভুল সিকিউরিটি পিন!</p>
    </div>
  </div>

  <div class="dashboard-container" id="main-dashboard">
    <header>
      <h1><i class="fa-solid fa-gavel"></i> BOMBAY GOLD কন্ট্রোল প্যানেল</h1>
      <button class="btn btn-primary" style="width: auto; padding: 8px 15px;" onclick="location.reload()"><i class="fa-solid fa-right-from-bracket"></i> লগআউট</button>
    </header>

    <div class="grid">
      <div class="card">
        <h3><i class="fa-solid fa-gear"></i> জেনারেল সেটিংস ও লাইভ কন্ট্রোল</h3>
        
        <div class="form-group">
          <label>লাইভ স্ট্যাটাস (Live Status)</label>
          <div class="status-container">
            <span id="status-label" class="status-text status-off">LIVE OFF</span>
            <button class="btn btn-primary" id="toggle-status-btn" style="width: auto; padding: 6px 12px;" onclick="toggleLiveStatus()">পরিবর্তন করুন</button>
          </div>
        </div>

        <div class="form-group">
          <label>লাইভ নোটিশ টেক্সট (Live Notice Text - Blink)</label>
          <input type="text" id="notice-text" placeholder="যেমন: Game Results in All West Bengal">
        </div>

        <div class="form-group">
          <label>ওয়েলকাম নোট (Welcome Note)</label>
          <input type="text" id="welcome-note" placeholder="যেমন: Welcome to Bombay Gold">
        </div>

        <button class="btn btn-primary" onclick="saveGeneralSettings()"><i class="fa-solid fa-floppy-disk"></i> সেটিংস সেভ করুন</button>
      </div>

      <div class="card">
        <h3><i class="fa-solid fa-pen-to-square"></i> আজকের বাজি রেজাল্ট এন্ট্রি</h3>
        
        <div class="form-group">
          <label>তারিখ সিলেক্ট করুন (Select Date)</label>
          <input type="date" id="result-date">
        </div>

        <div class="form-group">
          <label>টাইম (Time)</label>
          <input type="text" id="result-time" placeholder="যেমন: 11:25 AM">
        </div>

        <div class="form-group">
          <label>পাত্তি (Patti)</label>
          <input type="text" id="result-patti" placeholder="e.g. 123">
        </div>

        <div class="form-group">
          <label>সিঙ্গেল (Single)</label>
          <input type="text" id="result-single" placeholder="e.g. 6">
        </div>

        <button class="btn btn-primary" onclick="pushResultData()"><i class="fa-solid fa-paper-plane"></i> ডাটা পুশ করুন (Push Result)</button>
      </div>
    </div>
  </div>

  <script src="firebase-config.js"></script>

  <script>
    // ডেমো সিকিউরিটি পিন ভেরিফিকেশন (আপনি আপনার মতো পরিবর্তন করতে পারবেন)
    function verifyPin() {
      const pinInput = document.getElementById('master-pin').value;
      const correctPin = "1234"; // এখানে আপনার পছন্দের ৪ বা ৬ ডিজিটের পিন কোডটি বসিয়ে দিন
      
      if(pinInput === correctPin) {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
        loadCurrentSettings(); // অ্যাডমিন প্যানেল খোলার সাথে সাথে ডাটা লোড হবে
      } else {
        const err = document.getElementById('login-error');
        err.style.display = 'block';
        err.style.animation = 'shake 0.3s';
      }
    }

    // ফায়ারবেস থেকে বর্তমান সেটিংস লোড করা
    function loadCurrentSettings() {
      db.collection("settings").doc("live_control").get().then((doc) => {
        if (doc.exists) {
          const data = doc.data();
          document.getElementById('notice-text').value = data.notice || '';
          document.getElementById('welcome-note').value = data.welcome || '';
          updateStatusUI(data.isLive);
        }
      }).catch(err => console.error("Error loading settings: ", err));
    }

    let currentLiveStatus = false;
    function updateStatusUI(isLive) {
      currentLiveStatus = isLive;
      const label = document.getElementById('status-label');
      if(isLive) {
        label.innerText = "LIVE ON";
        label.className = "status-text status-live";
      } else {
        label.innerText = "LIVE OFF";
        label.className = "status-text status-off";
      }
    }

    function toggleLiveStatus() {
      updateStatusUI(!currentLiveStatus);
    }

    // জেনারেল সেটিংস ফায়ারবেসে সেভ করা
    function saveGeneralSettings() {
      const notice = document.getElementById('notice-text').value;
      const welcome = document.getElementById('welcome-note').value;

      db.collection("settings").doc("live_control").set({
        notice: notice,
        welcome: welcome,
        isLive: currentLiveStatus
      }).then(() => {
        alert("জেনারেল সেটিংস সফলভাবে সেভ হয়েছে!");
      }).catch(err => alert("সেভ করতে সমস্যা হয়েছে: " + err.message));
    }

    // রেজাল্ট ডাটা ফায়ারবেসে পুশ করা
    function pushResultData() {
      const date = document.getElementById('result-date').value;
      const time = document.getElementById('result-time').value;
      const patti = document.getElementById('result-patti').value;
      const single = document.getElementById('result-single').value;

      if(!date || !time || !patti || !single) {
        alert("অনুগ্রহ করে সবকটি ঘর পূরণ করুন!");
        return;
      }

      db.collection("results").add({
        date: date,
        time: time,
        patti: patti,
        single: single,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => {
        alert("আজকের বাজি রেজাল্ট সফলভাবে পুশ হয়েছে!");
        // ঘরগুলো খালি করা
        document.getElementById('result-time').value = '';
        document.getElementById('result-patti').value = '';
        document.getElementById('result-single').value = '';
      }).catch(err => alert("ডাটা পুশ করতে সমস্যা হয়েছে: " + err.message));
    }
  </script>
</body>
</html>
