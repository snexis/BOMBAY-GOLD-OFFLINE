<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY GOLD - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">
    <div class="container">
        <header class="main-header">
            <h1 class="logo-text">BOMBAY GOLD - CONTROL PANEL</h1>
            <p class="bengali-notice">লাইভ গেম রেজাল্ট, টাইম স্লট এবং প্রিভিয়াস বক্স এডিটর</p>
        </header>

        <div class="admin-box">
            <h2>Live Results & Time Customization (এখানে টাইম ও রেজাল্ট দুটোই টাইপ করা যাবে)</h2>
            <div class="form-group">
                <label>তারিখ সিলেক্ট করুন (পুরনো দিনের এডিটের জন্য ক্যালেন্ডার ব্যবহার করুন):</label>
                <input type="date" id="result-date" required>
            </div>

            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th style="width: 40%;">Time Slot (টাইম স্লট লিখুন)</th>
                            <th style="width: 30%;">৩ সংখ্যার পাত্তি (Patti)</th>
                            <th style="width: 30%;">১ সংখ্যার সিঙ্গেল (Single)</th>
                        </tr>
                    </thead>
                    <tbody id="admin-inputs-body">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="admin-box">
            <h2>Website Header & Button Link Customization</h2>
            <div class="form-group">
                <label>বাংলা সাবটাইটেল টেক্সট:</label>
                <input type="text" id="input-subtitle" value="লাইভ গেম রেজাল্ট সবথেকে প্রথম পাওয়ার জন্য ভিジット করুন এই সাইট এ।">
            </div>
            <div class="form-group">
                <label>চলন্ত লেখা (Marquee Text):</label>
                <input type="text" id="input-marquee" value="আজকের অফার আপডেট এর জন্য অপেক্ষা করুন...">
            </div>
            <div class="form-group">
                <label>Tips Button URL Link:</label>
                <input type="url" id="input-tips-url" placeholder="https://example.com/tips">
            </div>
            <div class="form-group">
                <label>Patti Chart Button URL Link:</label>
                <input type="url" id="input-patti-url" placeholder="https://example.com/patti">
            </div>
        </div>

        <button type="button" id="btn-publish" class="btn-publish">PUBLISH LIVE</button>
        <div id="status-message" class="status-msg"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
