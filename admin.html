<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
</head>
<body>
    <h3>রেজাল্ট যোগ করুন</h3>
    <input type="date" id="dateInput">
    <input type="text" id="timeInput" placeholder="সময় (যেমন: 10:20 AM)">
    <input type="text" id="resultInput" placeholder="রেজাল্ট (যেমন: 270-9)">
    <button onclick="saveData()">পাবলিশ করুন</button>

    <script src="https://www.gstatic.com/firebasejs/7.20.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/7.20.0/firebase-database.js"></script>

    <script>
        // আপনার দেওয়া কনফিগারেশন ঠিক করে বসানো হয়েছে
        var firebaseConfig = {
            apiKey: "AIzaSyABwusy3oZXqh3531oJlQorBsUMWxQF08I",
            authDomain: "live-result-b9155.firebaseapp.com",
            databaseURL: "https://live-result-b9155-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "live-result-b9155",
            storageBucket: "live-result-b9155.firebasestorage.app",
            messagingSenderId: "495121483481",
            appId: "1:495121483481:web:8e8bf65c71ea3d31ec60c8",
            measurementId: "G-DFDW40QF8"
        };
        
        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();

        function saveData() {
            var date = document.getElementById("dateInput").value;
            var time = document.getElementById("timeInput").value;
            var res = document.getElementById("resultInput").value;

            // ডাটাবেসে পুশ করা হচ্ছে
            firebase.database().ref('results/').push({
                date: date,
                time: time,
                result: res
            }).then(function() {
                alert("আপডেট সফল হয়েছে!");
            }).catch(function(error) {
                alert("ভুল হয়েছে: " + error.message);
            });
        }
    </script>
</body>
</html>
