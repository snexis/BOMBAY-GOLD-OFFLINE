<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>অ্যাডমিন প্যানেল | মাস্টার কন্ট্রোল</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="container">
    <div id="loginSection" class="card">
      <h2 style="color:var(--primary-gold)">🔐 অ্যাডমিন লগইন</h2>
      <select id="adminType">
        <option value="master">মাস্টার অ্যাডমিন</option>
        <option value="staff">স্টাফ</option>
      </select>
      <input type="password" id="adminPass" class="input-box" placeholder="পাসওয়ার্ড">
      <button class="btn" id="loginBtn">প্রবেশ করুন</button>
    </div>

    <div id="masterDashboard" class="hidden card">
      <h2 style="color:var(--primary-gold)">👑 মাস্টার কন্ট্রোল</h2>
      <button class="btn" id="liveToggle">লাইভ সুইচ</button>
      <input type="text" id="noticeInput" class="input-box" placeholder="নোটিশ আপডেট">
      <button class="btn" id="updateNotice">নোটিশ পাঠান</button>
      <hr style="margin:1rem 0;">
      <input type="text" id="resTime" placeholder="টাইম (যেমন: 12:30 PM)">
      <input type="text" id="resPatti" placeholder="পাত্তি">
      <input type="text" id="resVal" placeholder="রেজাল্ট (যেমন: 45)">
      <button class="btn" id="publishBtn" style="background:var(--success-green); color:white;">রেজাল্ট পাবলিশ</button>
    </div>
  </div>

  <script>
    const db = firebase.database();
    
    // লগইন লজিক
    document.getElementById('loginBtn').onclick = () => {
      const type = document.getElementById('adminType').value;
      const pass = document.getElementById('adminPass').value;
      
      if((type === 'master' && pass === 'sonu7') || (type === 'staff' && pass === 'sonu123')) {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('masterDashboard').classList.remove('hidden');
        alert('স্বাগতম!');
      } else {
        alert('ভুল পাসওয়ার্ড!');
      }
    };

    // পাবলিশ রেজাল্ট
    document.getElementById('publishBtn').onclick = () => {
      const time = document.getElementById('resTime').value;
      const patti = document.getElementById('resPatti').value;
      const result = document.getElementById('resVal').value;
      
      db.ref('results').push({time, patti, result});
      alert('রেজাল্ট পাবলিশ হয়েছে!');
    };
  </script>
</body>
</html>
