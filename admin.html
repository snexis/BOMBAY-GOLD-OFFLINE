<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Admin Panel</title>

<style>
body{
font-family:sans-serif;
background:#111;
color:white;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

.card{
background:#222;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
outline:none;
}

button{
padding:15px;
background:red;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
width:100%;
font-size:18px;
margin-top:10px;
}

button:hover{
opacity:.9;
}

.hidden{
display:none;
}
</style>
</head>
<body>

<div class="container">

<div class="card" id="loginBox">
<h1>Admin Login</h1>
<input id="adminPass" type="password" placeholder="Enter Password">
<button onclick="loginAdmin()">Login</button>
</div>

<div id="adminPanel" class="hidden">

<div class="card">
<h1>Ultimate Admin Panel</h1>
<p>Full Dashboard Control</p>
</div>

<div class="card">
<h2>Result Update</h2>
<input id="mmc" placeholder="MMC Result">
<input id="ffl" placeholder="FFL Result">
<input id="mumbai" placeholder="M Bazar Result">
<button onclick="saveResult()">Save Result</button>
</div>

<div class="card">
<h2>Manual Live Update</h2>
<input id="cricket" placeholder="Cricket Score">
<input id="football" placeholder="Football Score">
<input id="weather" placeholder="Weather Update">
<button onclick="saveManual()">Save Manual Data</button>
</div>

<div class="card">
<h2>Winner Update</h2>
<input id="winnerName" placeholder="Winner Name">
<button onclick="saveWinner()">Save Winner</button>
</div>

<div class="card">
<h2>History Update</h2>
<input id="historyGame" placeholder="Game Name">
<input id="historyResult" placeholder="Game Result">
<button onclick="saveHistory()">Save History</button>
</div>

<div class="card">
<h2>System Control</h2>
<button onclick="resetSystem()">Reset All Data</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
set,
push,
remove,
get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDS5w8TPFVLoy1i-RFJlRaCY_8LG9Xmpuw",
authDomain: "liveresultboard.firebaseapp.com",
databaseURL: "https://liveresultboard-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "liveresultboard",
storageBucket: "liveresultboard.firebasestorage.app",
messagingSenderId: "464276956164",
appId: "1:464276956164:web:68a0c1b7648e8d9f45c151"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

if(localStorage.getItem("adminLogin") === "true"){
document.getElementById("loginBox").style.display = "none";
document.getElementById("adminPanel").classList.remove("hidden");
loadOldData();
}

window.loginAdmin = function(){
const pass = document.getElementById("adminPass").value;

if(pass === "12345"){
localStorage.setItem("adminLogin","true");
document.getElementById("loginBox").style.display = "none";
document.getElementById("adminPanel").classList.remove("hidden");
loadOldData();
}else{
alert("Wrong Password");
}
};

async function loadOldData(){

const resultSnap = await get(ref(db,"results"));
if(resultSnap.exists()){
const data = resultSnap.val();
document.getElementById("mmc").value = data.mmc || "";
document.getElementById("ffl").value = data.ffl || "";
document.getElementById("mumbai").value = data.mumbai || "";
}

const manualSnap = await get(ref(db,"manual"));
if(manualSnap.exists()){
const data = manualSnap.val();
document.getElementById("cricket").value = data.cricket || "";
document.getElementById("football").value = data.football || "";
document.getElementById("weather").value = data.weather || "";
}

const winnerSnap = await get(ref(db,"winner"));
if(winnerSnap.exists()){
const data = winnerSnap.val();
document.getElementById("winnerName").value = data.name || "";
}
}

window.saveResult = function(){
set(ref(db,"results"),{
mmc: document.getElementById("mmc").value || "",
ffl: document.getElementById("ffl").value || "",
mumbai: document.getElementById("mumbai").value || ""
});
alert("Result Updated Successfully");
};

window.saveManual = function(){
set(ref(db,"manual"),{
cricket: document.getElementById("cricket").value || "",
football: document.getElementById("football").value || "",
weather: document.getElementById("weather").value || ""
});
alert("Manual Data Updated Successfully");
};

window.saveWinner = function(){
set(ref(db,"winner"),{
name: document.getElementById("winnerName").value || ""
});
alert("Winner Updated Successfully");
};

window.saveHistory = function(){
push(ref(db,"history"),{
game: document.getElementById("historyGame").value || "",
result: document.getElementById("historyResult").value || ""
});

document.getElementById("historyGame").value = "";
document.getElementById("historyResult").value = "";

alert("History Added Successfully");
};

window.resetSystem = function(){

if(confirm("Are you sure?")){

remove(ref(db,"results"));
remove(ref(db,"manual"));
remove(ref(db,"winner"));
remove(ref(db,"history"));

alert("System Reset Complete");
}
};

</script>

</body>
</html>
