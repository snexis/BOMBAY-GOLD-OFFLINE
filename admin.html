<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="app">

<header class="header">

<h1>Admin Panel</h1>

<p>Live Result Management System</p>

</header>

<!-- Website Settings -->

<section>

<h2>Website Settings</h2>

<input
type="text"
id="websiteName"
placeholder="Website Name">

<textarea
id="welcomeText"
placeholder="Welcome Text"></textarea>

<textarea
id="noticeText"
placeholder="Notice Text"></textarea>

<textarea
id="footerText"
placeholder="Footer Text"></textarea>

<button id="saveSettings">

Save Website Settings

</button>

</section>

<!-- Today's Result -->

<section>

<h2>Today's Result</h2>

<input
type="text"
id="morning"
placeholder="Morning Result">

<input
type="text"
id="day"
placeholder="Day Result">

<input
type="text"
id="evening"
placeholder="Evening Result">

<input
type="text"
id="night"
placeholder="Night Result">

<button id="saveTodayResult">

Save Today's Result

</button>

</section>

<!-- Live Result -->

<section>

<h2>Live Result</h2>

<input
type="text"
id="gameName"
placeholder="Game Name">

<input
type="text"
id="liveResult"
placeholder="Result">

<button id="saveLiveResult">

Save Live Result

</button>

</section>
  <!-- Previous Result -->

<section>

<h2>Previous Result</h2>

<input
type="date"
id="resultDate">

<input
type="text"
id="oldMorning"
placeholder="Morning Result">

<input
type="text"
id="oldDay"
placeholder="Day Result">

<input
type="text"
id="oldEvening"
placeholder="Evening Result">

<input
type="text"
id="oldNight"
placeholder="Night Result">

<button id="saveHistory">

Save Previous Result

</button>

</section>

<!-- Saved Result List -->

<section>

<h2>Saved Results</h2>

<div id="historyList">

No Result Found

</div>

</section>

<footer class="footer">

<p>

Admin Panel © 2026

</p>

</footer>

</div>

<script type="module" src="js/admin.js"></script>

</body>

</html>
