<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY GOLD - Admin Dashboard</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .wrapper { background: #1e293b; width: 100%; max-width: 650px; padding: 25px; border-radius: 12px; border: 2px solid #ef4444; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #334155; font-size: 16px; box-sizing: border-box; background: #0f172a; color: white; }
        button { background: #2563eb; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #1d4ed8; }
        #status-message { display: none; padding: 12px; margin-bottom: 15px; border-radius: 6px; background: #10b981; text-align: center; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { padding: 10px; border: 1px solid #334155; text-align: center; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h2>Admin Control Center</h2>
        <div id="status-message"></div>

        <div id="admin-auth-screen">
            <p style="margin-top:15px; color:#94a3b8;">প্যানেল আনলক করতে সিকিউরিটি পিন দিন:</p>
            <input type="password" id="admin-password" placeholder="পিন কোড লিখুন...">
            <button id="btn-login">LOGIN TO DASHBOARD</button>
        </div>

        <div id="admin-main-content" style="display:none; margin-top:20px;">
            <div id="admin-role-badge" style="background:#dc2626; padding:6px 12px; display:inline-block; border-radius:4px; font-weight:bold; font-size:13px; margin-bottom:15px;"></div>
            
            <div id="master-settings-box" style="display:none; border: 1px dashed #fbbf24; padding: 15px; margin-bottom: 20px; border-radius: 8px;">
                <h4 style="color:#fbbf24; margin-bottom: 10px;">মাস্টার কন্ট্রোল সেটিংস</h4>
                <p style="font-size:14px; color:#94a3b8;">এখানে শুধুমাত্র মাস্টার এডমিন এক্সেস করতে পারেন।</p>
                </div>

            <h3 style="color:#10b981; margin-top:20px;">🔑 প্লেয়ার ওটিপি রিকোয়েস্ট (OTP Approval)</h3>
            <table>
                <thead>
                    <tr style="background:#1e293b; color:#10b981;"><th>প্লেয়ার আইডি</th><th>পিন নম্বর</th><th>কোড</th><th>অ্যাকশন</th></tr>
                </thead>
                <tbody id="admin-otp-requests-body">
                    </tbody>
            </table>

            <h3 style="margin-top:30px; color:#fbbf24;">✍️ আজকের লাইভ রেজাল্ট এন্ট্রি</h3>
            <div style="margin-top:10px; margin-bottom:10px;">
                <label>তারিখ সিলেক্ট করুন:</label>
                <input type="date" id="result-date" style="width:auto; display:inline-block; margin-left:10px;">
            </div>
            
            <table>
                <thead>
                    <tr style="background:#334155;"><th>বাজি স্লট</th><th>পত্তি</th><th>সিঙ্গেল</th><th>অ্যাকশন</th></tr>
                </thead>
                <tbody id="admin-inputs-body">
                    </tbody>
            </table>
            
            <button id="btn-logout" style="background:#64748b; margin-top:30px;">LOGOUT PANEL</button>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
