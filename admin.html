<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Bombay Gold</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-container">
    <h2>অ্যাডমিন প্যানেল</h2>
    
    <div class="admin-input-group">
        <label>লাইভ স্ট্যাটাস:</label>
        <button id="toggleLive">চালু/বন্ধ করুন</button>
    </div>

    <div class="admin-input-group">
        <input type="text" id="noticeInput" placeholder="নোটিশ লিখুন...">
        <button id="saveNotice">আপডেট নোটিশ</button>
    </div>

    <div id="resultEditor" class="admin-input-group">
        <h3>রেজাল্ট এডিটর</h3>
        <div id="rowsContainer"></div>
        <button id="addRow">নতুন রো যোগ করুন</button>
        <button id="saveAllResults">সব সেভ করুন</button>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
