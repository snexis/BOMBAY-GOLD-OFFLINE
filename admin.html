<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bombay Gold - Admin Panel</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    .section { border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:14px; margin:12px 0; background:rgba(255,255,255,.03); }
    .row { display:flex; gap:12px; flex-wrap:wrap; margin:10px 0; }
    .row > * { flex:1 1 220px; }
    label { display:block; font-size:12px; opacity:.85; margin-bottom:6px; }
    input, select, button { width:100%; padding:10px; border-radius:10px; border:1px solid #2a2a2a; background:#0b0f14; color:#e8eef7; }
    button { cursor:pointer; border-color:#3b82f6; }
    .status { font-size:12px; opacity:.9; }
    .mini { font-size:12px; opacity:.85; }
  </style>
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div>
        <div class="brand">👑 Bombay Gold Admin</div>
        <div class="mini" id="whoami">Loading session…</div>
      </div>
      <button id="btnLogout" type="button">Logout</button>
    </header>

    <main>
      <section class="section">
        <h2>Website Status</h2>
        <div class="row">
          <div>
            <label>Enabled</label>
            <select id="websiteEnabled">
              <option value="true">True</option>
              <option value="false">False</option>
            </select>
          </div>
          <div>
            <label>&nbsp;</label>
            <button id="btnToggleWebsite" type="button">Save Status</button>
          </div>
        </div>
      </section>
      </main>
  </div>

  <script type="module">
    import "./app.js";
    window.addEventListener("DOMContentLoaded", () => {
      window.__SECURE_APP__.bootAdmin?.();
    });
  </script>
</body>
</html>
