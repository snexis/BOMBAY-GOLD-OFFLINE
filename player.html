<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Player Dashboard</title>
</head>
<body>
    <div id="playerMessageBar"></div>
    <div id="balanceView">
        <span>ক্রেডিট: <span id="creditBalance"></span></span>
        <span>উইনিং: <span id="winningBalance"></span></span>
    </div>
    <div id="gameInterface">
        <input type="text" id="time" placeholder="সময়">
        <input type="text" id="patti" placeholder="পাত্তি">
        <input type="text" id="single" placeholder="সিঙ্গেল">
        <input type="number" id="amount" placeholder="অ্যামাউন্ট">
        <button id="submitBet">সাবমিট</button>
    </div>
    <div id="playerHistory"></div>
    <script type="module" src="app.js"></script>
</body>
</html>
