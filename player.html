<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bombay Gold - Player</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div class="brand">🎮 Bombay Gold</div>
      <button id="btnLogout" type="button">Logout</button>
    </header>

    <main>
      <section class="panel">
        <h2>Login Verification</h2>
        <label>Player ID</label>
        <input id="playerId" placeholder="Enter Player ID" />
        <button id="btnSendCode" type="button">Send Code</button>
        <input id="loginCode" placeholder="Enter OTP" />
        <button id="btnVerifyCode" type="button">Verify & Login</button>
        <div id="loginStatus">—</div>
      </section>
    </main>
  </div>

  <script type="module">
    import "./app.js";
  </script>
</body>
</html>
