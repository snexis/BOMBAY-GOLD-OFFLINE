<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>প্লেয়ার প্যানেল | BOMBAY-GOLD</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="container">
    <div id="loginSection" class="card">
      <h2 style="color:var(--primary-gold)">🔐 প্লেয়ার লগইন</h2>
      <input type="text" id="playerName" class="input-box" placeholder="আপনার নাম">
      <input type="password" id="playerPin" class="input-box" placeholder="পিন (৪ ডিজিট)" maxlength="4">
      <button class="btn" id="loginBtn">লগইন রিকোয়েস্ট</button>
      <div id="otpSection" class="hidden">
        <input type="text" id="otpInput" class="input-box" placeholder="অ্যাডমিন ওটিপি">
        <button class="btn" id="verifyBtn">ভেরিফাই</button>
      </div>
    </div>

    <div id="gamePanel" class="hidden card">
      <h2 style="color:var(--primary-gold)">🎮 গেম টেবিল</h2>
      <div class="card" style="background:#0f172a">
        <span>💰 মেইন: <span id="mBal">0</span></span> | 
        <span>🏆 উইনিং: <span id="wBal">0</span></span>
      </div>
      <input type="text" id="bTime" class="input-box" placeholder="টাইম">
      <input type="text" id="bPatti" class="input-box" placeholder="পাত্তি">
      <input type="number" id="bAmt" class="input-box" placeholder="পরিমাণ">
      <button class="btn" id="submitBet" style="width:100%">সাবমিট বেট</button>
    </div>
  </div>

  <script>
    const db = firebase.database();
    let currentUserId = null;

    // লগইন ও বেটিং লজিক আপনার ব্লুপ্রিন্ট অনুযায়ী এখানে কাজ করবে
    document.getElementById('loginBtn').onclick = () => {
      const name = document.getElementById('playerName').value;
      const pin = document.getElementById('playerPin').value;
      currentUserId = `${name}_${pin}`;
      
      db.ref('loginRequests/' + currentUserId).set({ name, pin });
      document.getElementById('otpSection').classList.remove('hidden');
      alert('রিকোয়েস্ট পাঠানো হয়েছে, ওটিপির জন্য অপেক্ষা করুন।');
    };

    document.getElementById('verifyBtn').onclick = () => {
      const inputOtp = document.getElementById('otpInput').value;
      db.ref('loginRequests/' + currentUserId + '/adminOtp').once('value').then(snap => {
        if(snap.val() == inputOtp) {
          document.getElementById('loginSection').classList.add('hidden');
          document.getElementById('gamePanel').classList.remove('hidden');
        } else {
          alert('ভুল ওটিপি!');
        }
      });
    };
  </script>
</body>
</html>
