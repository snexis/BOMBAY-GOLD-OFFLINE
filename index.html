<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY GOLD - Live Game Results</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- জরুরি লাল নোটিফিকেশন বার (ডাটা থাকলে শো করবে, না থাকলে অটো হাইড) -->
        <div id="custom-alert-bar" class="custom-alert-bar"></div>

        <header class="main-header">
            <!-- LIVE ব্লিংকিং আইকন -->
            <div class="live-badge">● LIVE</div>
            <h1 class="logo-text">BOMBAY GOLD</h1>
            <p id="site-subtitle" class="subtitle-text">লাইভ গেম রেজাল্ট সবথেকে প্রথম পাওয়ার জন্য ভিজিট করুন এই সাইট এ।</p>
            <div class="marquee-container">
                <marquee id="site-marquee" scrollamount="5">আজকের লাইভ আপডেট এর জন্য অপেক্ষা করুন...</marquee>
            </div>
        </header>

        <div class="nav-buttons">
            <a href="#" id="link-tips" class="btn btn-tips" target="_blank">Tips</a>
            <a href="#" id="link-patti" class="btn btn-patti" target="_blank">Patti Chart</a>
        </div>

        <div class="section-title">
            <h2>Today's Live Game Results</h2>
            <h3>Game Results in All West Bengal</h3>
        </div>

        <!-- রেজাল্ট কন্টেইনার (এখানে কখনো লুপ আটকে থাকবে না) -->
        <div id="results-container">
            <div class="loading-text">ফলাফল লোড হচ্ছে... অনুগ্রহ করে অপেক্ষা করুন।</div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
