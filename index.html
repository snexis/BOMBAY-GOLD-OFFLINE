<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Result Board</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#8b0000,#ff4500);
color:white;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:15px;
margin-bottom:20px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.result{
font-size:40px;
font-weight:bold;
color:red;
}

@media(max-width:768px){
.result{
font-size:28px;
}
}
</style>
</head>
<body>

<div class="container">

<div class="card">
<h1>🔥 LIVE RESULT BOARD 🔥</h1>
<p>Realtime Auto Update</p>
</div>

<div class="grid">

<div class="card">
<h2>MMC</h2>
<div id="cmm" class="result">Loading...</div>
</div>

<div class="card">
<h2>FFL</h2>
<div id="lff" class="result">Loading...</div>
</div>

<div class="card">
<h2>M Bazar</h2>
<div id="mumbai" class="result">Loading...</div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDS5w8TPFVLoy1i-RFJlRaCY_8LG9Xmpuw",
authDomain: "liveresultboard.firebaseapp.com",
databaseURL: "https://liveresultboard-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "liveresultboard",
storageBucket: "liveresultboard.firebasestorage.app",
messagingSenderId: "464276956164",
appId: "1:464276956164:web:68a0c1b7648e8d9f45c151"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"results"), (snapshot) => {
const data = snapshot.val();

if(data){
document.getElementById("cmm").innerText = data.cmm || "No Data";
document.getElementById("lff").innerText = data.lff || "No Data";
document.getElementById("mumbai").innerText = data.mumbai || "No Data";
}
});
</script>

</body>
</html>
