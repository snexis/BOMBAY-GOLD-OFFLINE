    <div class="quick-nav">

        <a href="#" id="pattiBtn">Patti Chart</a>
    </div>

    <main id="resultContainer" class="container">
        <div class="result-grid" id="resultGrid">
            </div>
    </main>

    <footer id="footerSection">
        <p>© 2026 Bombay Gold. All rights reserved.</p>
    </footer>

    <script type="module" src="js/app.js"></script>

</html>
