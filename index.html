<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bombay Gold | Today's Live Result</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="top-header">

<div class="logo-area">

<img src="logo.png" alt="Bombay Gold Logo" class="logo">

<div>

<h1>Bombay Gold</h1>

<p>Today's Live Result</p>

</div>

</div>

<div class="right-area">

<span id="todayDate"></span>

<div class="live-box">

<span class="live-dot"></span>

LIVE

</div>

</div>

</header>
<main class="container">

    <!-- TODAY RESULT 1 -->

    <section class="result-card">

        <div class="card-title">

            <h2>Today's Result - 1</h2>

        </div>

        <div class="result-grid">

            <div class="result-item">
                <span class="time">10:20 AM</span>
                <span id="r1_1020" class="number">--</span>
            </div>

            <div class="result-item">
                <span class="time">11:50 AM</span>
                <span id="r1_1150" class="number">--</span>
            </div>

            <div class="result-item">
                <span class="time">01:20 PM</span>
                <span id="r1_0120" class="number">--</span>
            </div>

            <div class="result-item">
                <span class="time">02:50 PM</span>
                <span id="r1_0250" class="number">--</span>
            </div>

        </div>

    </section>

    <!-- TODAY RESULT 2 -->

    <section class="result-card">

        <div class="card-title">

            <h2>Today's Result - 2</h2>

        </div>

        <div class="result-grid">

            <div class="result-item">
                <span class="time">04:20 PM</span>
                <span id="r2_0420" class="number">--</span>
            </div>

            <div class="result-item">
                <span class="time">05:50 PM</span>
                <span id="r2_0550" class="number">--</span>
            </div>

            <div class="result-item">
                <span class="time">07:20 PM</span>
                <span id="r2_0720" class="number">--</span>
            </div>

            <div class="result-item">
                <span class="time">08:50 PM</span>
                <span id="r2_0850" class="number">--</span>
            </div>

        </div>

    </section>
    
    <!-- NOTICE BOARD -->

    <section class="notice-section">

        <div class="notice-title">

            📢 Notice

        </div>

        <div class="notice-box">

            <marquee id="noticeText" behavior="scroll" direction="left" scrollamount="5">

                Welcome to Bombay Gold Live Result Website

            </marquee>

        </div>

    </section>


    <!-- PREVIOUS RESULT -->

    <section class="previous-result">

        <button id="previousBtn">

            Previous Result

        </button>

    </section>


</main>


<!-- FOOTER -->

<footer class="footer">

    <p>

        © 2026 Bombay Gold | Live Result

    </p>

</footer>


<!-- Firebase -->

<script type="module" src="js/firebase.js"></script>

<script type="module" src="js/app.js"></script>

</body>

</html>
