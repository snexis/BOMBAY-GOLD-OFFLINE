<!DOCTYPE html>

        th { background-color: #004a99; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to Bombay Gold Fatafat</h1>
    </div>
    
    <h2>Today's Live Result</h2>
    <table id="resultTable">
        <thead>
            <tr>
                <th>তারিখ</th>
                <th>সময়</th>
                <th>রেজাল্ট</th>

        </thead>
        <tbody id="resultBody"></tbody>

    <script type="module">

const firebaseConfig = {
  apiKey: "AIzaSyABwusy3oZXqh3531oJlQorBsUMWxQF08I",
  authDomain: "live-result-b9155.firebaseapp.com",
  databaseURL: "https://live-result-b9155-default-rtdb.asia-southeast1.firebasedatabase.app",

};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const resultRef = ref(db, 'results/');
        onValue(resultRef, (snapshot) => {
            const data = snapshot.val();
            const tbody = document.getElementById("resultBody");
            tbody.innerHTML = "";
            for (let id in data) {
                let row = `<tr><td>${data[id].date}</td><td>${data[id].time}</td><td>${data[id].result}</td></tr>`;
                tbody.innerHTML += row;
            }
        });
    </script>
