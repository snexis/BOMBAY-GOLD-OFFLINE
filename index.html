<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>BOMBAY GOLD</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

    <div class="logo-container">
        <h1 class="logo-animation" id="mainHeader">BOMBAY GOLD</h1>
    </div>

    <div class="container">
        <table class="result-table">
            <thead>
                <tr>
                    <th>টাইম</th>
                    <th>পাত্তি</th>
                    <th>রেজাল্ট</th>
                </tr>
            </thead>
            <tbody id="resultList">
                </tbody>
        </table>
    </div>

    <script src="app.js"></script>
    <script>
        // হেডার আপডেট চেক
        db.ref('settings/interface/header').on('value', (snapshot) => {
            if(snapshot.val()) document.getElementById('mainHeader').innerText = snapshot.val();
        });

        // রেজাল্ট লোড
        db.ref('dailyResults').on('value', (snapshot) => {
            const list = document.getElementById('resultList');
            list.innerHTML = '';
            snapshot.forEach(child => {
                const item = child.val();
                list.innerHTML += `
                    <tr style="color: #facc15;">
                        <td>${item.time}</td>
                        <td>${item.patti}</td>
                        <td>${item.result} ✅</td>
                    </tr>`;
            });
        });
    </script>
</body>
</html>
