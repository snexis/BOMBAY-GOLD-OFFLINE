<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Bombay Gold Fatafat - Live Result</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; }
        .header { background-color: #004a99; color: white; padding: 15px; }
        .table-container { width: 95%; margin: 20px auto; }
        table { width: 100%; border-collapse: collapse; background: white; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #004a99; color: white; }
        h3 { background: #eee; padding: 10px; margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Welcome to Bombay Gold Fatafat</h2>
        <h3>Today's Live Result</h3>
    </div>

    <div class="table-container" id="displayArea"></div>

    <script src="https://www.gstatic.com/firebasejs/7.20.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/7.20.0/firebase-database.js"></script>

    <script>
        // আপনার কনফিগারেশন
        var firebaseConfig = {
            apiKey: "AIzaSyABwusy3oZXqh3531oJlQorBsUMWxQF08I",
            authDomain: "live-result-b9155.firebaseapp.com",
            databaseURL: "https://live-result-b9155-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "live-result-b9155",
            storageBucket: "live-result-b9155.firebasestorage.app",
            messagingSenderId: "495121483481",
            appId: "1:495121483481:web:8e8bf65c71ea3d31ec60c8"
        };
        
        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();

        // ডাটাবেস থেকে ডাটা আনা
        database.ref('allResults/').on('value', function(snapshot) {
            var data = snapshot.val();
            var displayArea = document.getElementById("displayArea");
            displayArea.innerHTML = ""; // আগের টেবিল ক্লিয়ার করা

            if (!data) {
                displayArea.innerHTML = "<p>কোনো রেজাল্ট পাওয়া যায়নি।</p>";
                return;
            }

            // ডাটাগুলোকে তারিখ অনুযায়ী গ্রুপ করা হচ্ছে
            var groupedData = {};
            for (var key in data) {
                var item = data[key];
                if (!groupedData[item.date]) groupedData[item.date] = [];
                groupedData[item.date].push(item);
            }

            // গ্রুপ করা ডাটাগুলো দিয়ে টেবিল তৈরি
            for (var date in groupedData) {
                var rows = groupedData[date];
                var html = `<h3>${date}</h3><table border="1"><tr><th>সময়</th><th>রেজাল্ট</th></tr>`;
                
                rows.forEach(function(r) {
                    html += `<tr><td>${r.time}</td><td>${r.result}</td></tr>`;
                });
                
                html += `</table>`;
                displayArea.innerHTML += html;
            }
        });
    </script>
</body>
</html>
