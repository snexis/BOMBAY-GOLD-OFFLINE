<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY GOLD - Live Result Center</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --gold: #fbbf24; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: var(--panel); width: 100%; max-width: 500px; padding: 25px; border-radius: 12px; border: 2px solid var(--gold); text-align: center; margin-top: 30px; }
        h1 { color: var(--gold); margin-bottom: 15px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: center; }
        th { background: #334155; color: var(--gold); }
    </style>
</head>
<body>
    <div class="container">
        <h1>BOMBAY GOLD LIVE</h1>
        <div id="today-results-container">
            <p style="color: #94a3b8; font-style: italic;">ফলাফল লোড হচ্ছে... অনুগ্রহ করে অপেক্ষা করুন।</p>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
