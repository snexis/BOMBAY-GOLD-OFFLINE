<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Dashboard</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#8b0000,#ff4500);
color:white;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:20px;
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:30px;
}

.tab-btn{
padding:12px 20px;
border:none;
border-radius:10px;
background:black;
color:white;
cursor:pointer;
}

.section{
display:none;
}

.section.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.result{
font-size:35px;
font-weight:bold;
color:red;
}

.weather{
font-size:28px;
font-weight:bold;
color:blue;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>🔥 LIVE DASHBOARD 🔥</h1>
<p>Realtime + Manual Hybrid System</p>
</div>

<div class="tabs">
<button class="tab-btn" onclick="showTab('result')">Result</button>
<button class="tab-btn" onclick="showTab('cricket')">Cricket</button>
<button class="tab-btn" onclick="showTab('football')">Football</button>
<button class="tab-btn" onclick="showTab('weather')">Weather</button>
</div>

<div id="result" class="section active">
<div class="grid">

<div class="card">
<h2>MMC</h2>
<div id="mmc" class="result">Loading...</div>
</div>

<div class="card">
<h2>FFL</h2>
<div id="ffl" class="result">Loading...</div>
</div>

<div class="card">
<h2>M Bazar</h2>
<div id="mumbai" class="result">Loading...</div>
</div>

</div>
</div>

<div id="cricket" class="section">
<div class="card">
<h2>🏏 Live Cricket</h2>
<div id="cricketScore" class="result">Loading...</div>
</div>
</div>

<div id="football" class="section">
<div class="card">
<h2>⚽ Live Football</h2>
<div id="footballScore" class="result">Loading...</div>
</div>
</div>

<div id="weather" class="section">
<div class="card">
<h2>🌦 Live Weather</h2>
<div id="weatherData" class="weather">Loading...</div>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDS5w8TPFVLoy1i-RFJlRaCY_8LG9Xmpuw",
authDomain: "liveresultboard.firebaseapp.com",
databaseURL: "https://liveresultboard-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "liveresultboard",
storageBucket: "liveresultboard.firebasestorage.app",
messagingSenderId: "464276956164",
appId: "1:464276956164:web:68a0c1b7648e8d9f45c151"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"results"), (snapshot) => {
const data = snapshot.val();

if(data){
document.getElementById("mmc").innerText = data.mmc || "No Data";
document.getElementById("ffl").innerText = data.ffl || "No Data";
document.getElementById("mumbai").innerText = data.mumbai || "No Data";
}
});

onValue(ref(db,"manual"), (snapshot) => {
const data = snapshot.val();

if(data){
document.getElementById("cricketScore").innerText = data.cricket || "No Data";
document.getElementById("footballScore").innerText = data.football || "No Data";
document.getElementById("weatherData").innerText = data.weather || "No Data";
}
});

window.showTab = function(tabName){
document.querySelectorAll(".section").forEach(section=>{
section.classList.remove("active");
});
document.getElementById(tabName).classList.add("active");
};

async function fetchWeather(){
try{
const res = await fetch("https://wttr.in/?format=3");
const data = await res.text();
document.getElementById("weatherData").innerText = data;
}catch(error){
document.getElementById("weatherData").innerText = "Weather Error";
}
}

fetchWeather();
setInterval(fetchWeather,30000);

</script>

</body>
</html>
