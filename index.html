<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY-GOLD</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f4; margin: 0; }
        .header { background: #0056b3; color: white; padding: 20px; }
        .live-btn { padding: 5px 15px; border-radius: 20px; color: white; font-weight: bold; }
        .live-active { background-color: green; }
        .live-inactive { background-color: red; }
        .result-container { margin: 20px auto; width: 90%; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #007bff; color: white; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="header">
        <h1>BOMBAY-GOLD</h1>
        <h2>Today Live Result</h2>
    </div>

    <div class="result-container" id="main-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Today's Live Game Results</h3>
            <span id="live-indicator" class="live-btn live-inactive">LIVE</span>
        </div>
        <div id="results-table-container"></div>
    </div>

    <script>
       const firebaseConfig = {
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyABwusy3oZXqh3531oJlQorBsUMWxQF08I",
  authDomain: "live-result-b9155.firebaseapp.com",
  databaseURL: "https://live-result-b9155-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "live-result-b9155",
  storageBucket: "live-result-b9155.firebasestorage.app",
  messagingSenderId: "495121483481",
  appId: "1:495121483481:web:8e8bf65c71ea3d31ec60c8",
  measurementId: "G-DFDW40QF87"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('settings').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                const liveBtn = document.getElementById('live-indicator');
                const mainSec = document.getElementById('main-section');
                
                if(data.isLive) {
                    liveBtn.className = "live-btn live-active";
                    liveBtn.innerText = "LIVE (ON)";
                } else {
                    liveBtn.className = "live-btn live-inactive";
                    liveBtn.innerText = "OFF";
                }
                mainSec.style.display = data.showResults ? "block" : "none";
            }
        });

        db.ref('results').on('value', (snapshot) => {
            const resultsData = snapshot.val();
            const container = document.getElementById('results-table-container');
            container.innerHTML = ""; 

            if(resultsData) {
                Object.keys(resultsData).reverse().forEach(date => {
                    let dateHtml = `<h4>Date: ${date}</h4><table><tr>`;
                    let dataRow = `<tr>`;
                    const times = resultsData[date];
                    for (let time in times) {
                        dateHtml += `<th>${time}</th>`;
                        dataRow += `<td>${times[time].patti}<br><b>${times[time].single}</b></td>`;
                    }
                    dateHtml += `</tr>${dataRow}</tr></table>`;
                    container.innerHTML += dateHtml;
                });
            } else {
                container.innerHTML = "<p>No results found.</p>";
            }
        });
    </script>
</body>
</html>
