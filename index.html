<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bombay Gold - Live Results</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header Section -->
    <div class="header-container">
        <h1 class="main-title">BOMBAY GOLD</h1>
        <p class="bengali-subtitle">লাইভ গেম রেজাল্ট সবথেকে প্রথম পাওয়ার জন্য ভিজিট করুন এই সাইট এ।</p>
        
        <!-- Marquee/Announcement Section -->
        <div class="marquee-container">
            <div class="marquee-text" id="marqueeText">
                Welcome to Bombay Gold - Get live results first!
            </div>
        </div>
    </div>

    <!-- Navigation Buttons -->
    <div class="button-container">
        <button class="nav-button" id="tipsBtn">Tips</button>
        <button class="nav-button" id="pattiChartBtn">Patti Chart</button>
    </div>

    <!-- Results Display Section -->
    <div class="results-container">
        <div id="resultsTableContainer">
            <!-- Tables will be dynamically inserted here -->
        </div>
    </div>

    <!-- Hidden Modal for Tips and Patti Chart -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <button class="close-btn" id="closeModal">&times;</button>
            <h2 id="modalTitle">Tips</h2>
            <div id="modalBody">
                <!-- Content will be inserted dynamically -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
