<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Live Dashboard</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#8b0000,#ff4500);
color:white;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:20px;
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:30px;
}

.tab-btn{
padding:12px 20px;
border:none;
border-radius:10px;
background:black;
color:white;
cursor:pointer;
}

.section{
display:none;
}

.section.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,.3);
margin-bottom:20px;
}

.result{
font-size:35px;
font-weight:bold;
color:red;
}

.weather{
font-size:28px;
font-weight:bold;
color:blue;
}

.winner{
font-size:40px;
color:gold;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0;}
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:15px;
border:1px solid #ddd;
}

th{
background:black;
color:white;
}
</style>
</head>
<body>

<audio id="alertSound">
<source src="https://www.soundjay.com/buttons/sounds/beep-07.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div class="header">
<h1>🔥 ULTIMATE LIVE DASHBOARD 🔥</h1>
<p>Realtime + Manual + History + Winner System</p>
</div>

<div class="tabs">
<button class="tab-btn" onclick="showTab('result')">Result</button>
<button class="tab-btn" onclick="showTab('cricket')">Cricket</button>
<button class="tab-btn" onclick="showTab('football')">Football</button>
<button class="tab-btn" onclick="showTab('weather')">Weather</button>
<button class="tab-btn" onclick="showTab('history')">History</button>
</div>

<div id="result" class="section active">
<div class="grid">

<div class="card">
<h2>MMC</h2>
<div id="mmc" class="result">Loading...</div>
</div>

<div class="card">
<h2>FFL</h2>
<div id="ffl" class="result">Loading...</div>
</div>

<div class="card">
<h2>M Bazar</h2>
<div id="mumbai" class="result">Loading...</div>
</div>

</div>

<div class="card">
<h2>🏆 Winner</h2>
<div id="winner" class="winner">Waiting...</div>
</div>
</div>

<div id="cricket" class="section">
<div class="card">
<h2>🏏 Live Cricket</h2>
<div id="cricketScore" class="result">Loading...</div>
</div>
</div>

<div id="football" class="section">
<div class="card">
<h2>⚽ Live Football</h2>
<div id="footballScore" class="result">Loading...</div>
</div>
</div>

<div id="weather" class="section">
<div class="card">
<h2>🌦 Live Weather</h2>
<div id="weatherData" class="weather">Loading...</div>
</div>
</div>

<div id="history" class="section">
<div class="card">
<h2>📜 Result History</h2>

<table>
<thead>
<tr>
<th>Game</th>
<th>Result</th>
</tr>
</thead>

<tbody id="historyTable">
<tr>
<td colspan="2">Loading...</td>
</tr>
</tbody>

</table>

</div>
  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDS5w8TPFVLoy1i-RFJlRaCY_8LG9Xmpuw",
authDomain: "liveresultboard.firebaseapp.com",
databaseURL: "https://liveresultboard-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "liveresultboard",
storageBucket: "liveresultboard.firebasestorage.app",
messagingSenderId: "464276956164",
appId: "1:464276956164:web:68a0c1b7648e8d9f45c151"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let manualWeather = false;

onValue(ref(db,"results"), (snapshot)=>{
const data = snapshot.val();

if(data){
document.getElementById("mmc").innerText = data.mmc || "No Data";
document.getElementById("ffl").innerText = data.ffl || "No Data";
document.getElementById("mumbai").innerText = data.mumbai || "No Data";
}
});

onValue(ref(db,"manual"), (snapshot)=>{
const data = snapshot.val();

if(data){
document.getElementById("cricketScore").innerText =
data.cricket || "No Data";

document.getElementById("footballScore").innerText =
data.football || "No Data";

if(data.weather){
manualWeather = true;
document.getElementById("weatherData").innerText =
data.weather;
}else{
manualWeather = false;
}
}
});

onValue(ref(db,"winner"), (snapshot)=>{
const data = snapshot.val();

if(data){
document.getElementById("winner").innerText =
data.name || "Waiting...";
document.getElementById("alertSound").play();
}
});

onValue(ref(db,"history"), (snapshot)=>{
const data = snapshot.val();

if(data){
let html = "";

Object.keys(data).forEach((key)=>{
html += `
<tr>
<td>${data[key].game}</td>
<td>${data[key].result}</td>
</tr>
`;
});

document.getElementById("historyTable").innerHTML = html;
}
});

window.showTab = function(tabName){
document.querySelectorAll(".section").forEach(section=>{
section.classList.remove("active");
});
document.getElementById(tabName).classList.add("active");
};

async function fetchWeather(){
if(manualWeather) return;

try{
const res = await fetch("https://wttr.in/?format=3");
const data = await res.text();
document.getElementById("weatherData").innerText = data;
}catch{
document.getElementById("weatherData").innerText =
"Weather Error";
}
}

async function fetchCricket(){
try{
document.getElementById("cricketScore").innerText =
"Live Cricket Updating...";
}catch{
document.getElementById("cricketScore").innerText =
"Cricket Error";
}
}

async function fetchFootball(){
try{
document.getElementById("footballScore").innerText =
"Live Football Updating...";
}catch{
document.getElementById("footballScore").innerText =
"Football Error";
}
}

fetchWeather();
fetchCricket();
fetchFootball();

setInterval(fetchWeather,30000);
setInterval(fetchCricket,30000);
setInterval(fetchFootball,30000);

</script>

</body>
</html>
</div>

</div>
