<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Result Board</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:linear-gradient(135deg,#8b0000,#ff4500);
color:white;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:38px;
font-weight:bold;
}

.live-box{
background:white;
color:black;
padding:20px;
border-radius:15px;
margin-bottom:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.live-box h2{
font-size:28px;
margin-bottom:10px;
}

.result-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
}

.result-card{
background:#fff;
color:#111;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.result-card h3{
font-size:24px;
margin-bottom:10px;
}

.result-number{
font-size:35px;
font-weight:bold;
color:red;
}

.timer{
font-size:22px;
margin-top:15px;
}

button{
padding:14px 25px;
border:none;
border-radius:10px;
background:black;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

table{
width:100%;
background:white;
color:black;
border-radius:15px;
overflow:hidden;
margin-top:30px;
}

th,td{
padding:15px;
text-align:center;
border-bottom:1px solid #ddd;
}

th{
background:black;
color:white;
}

@media(max-width:768px){
.header h1{
font-size:28px;
}
.result-number{
font-size:28px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🔥 LIVE RESULT BOARD 🔥</h1>
</div>

<div class="live-box">
<h2>Today Live Result</h2>
<p>Auto Update Every 10 Seconds</p>
<div class="timer" id="timer">Next Update In: 10s</div>
<br>
<button onclick="updateResults()">Refresh Result</button>
</div>

<div class="result-grid">

<div class="result-card">
<h3>CMM</h3>
<div class="result-number" id="cmm">367-6</div>
</div>

<div class="result-card">
<h3>LFF</h3>
<div class="result-number" id="lff">221-4</div>
</div>

<div class="result-card">
<h3>Mumbai Bazar</h3>
<div class="result-number" id="mumbai">450-9</div>
</div>

</div>

<div class="live-box">
<h2>Result History</h2>

<table>
<thead>
<tr>
<th>Serial</th>
<th>Time</th>
<th>Game</th>
<th>Result</th>
</tr>
</thead>

<tbody id="historyTable">

<tr>
<td>1</td>
<td>10:00 AM</td>
<td>CMM</td>
<td>367-6</td>
</tr>

<tr>
<td>2</td>
<td>10:10 AM</td>
<td>LFF</td>
<td>221-4</td>
</tr>

<tr>
<td>3</td>
<td>10:20 AM</td>
<td>Mumbai</td>
<td>450-9</td>
</tr>

</tbody>
</table>
</div>
<script>

let count = 10;
let serial = 4;

function randomResult(){
let num1 = Math.floor(Math.random()*900)+100;
let num2 = Math.floor(Math.random()*9)+1;
return num1 + "-" + num2;
}

function updateResults(){

let cmm = randomResult();
let lff = randomResult();
let mumbai = randomResult();

document.getElementById("cmm").innerText = cmm;
document.getElementById("lff").innerText = lff;
document.getElementById("mumbai").innerText = mumbai;

let now = new Date().toLocaleTimeString();

let table = document.getElementById("historyTable");

table.innerHTML += `
<tr>
<td>${serial++}</td>
<td>${now}</td>
<td>CMM</td>
<td>${cmm}</td>
</tr>

<tr>
<td>${serial++}</td>
<td>${now}</td>
<td>LFF</td>
<td>${lff}</td>
</tr>

<tr>
<td>${serial++}</td>
<td>${now}</td>
<td>Mumbai</td>
<td>${mumbai}</td>
</tr>
`;

localStorage.setItem("history", table.innerHTML);

count = 10;
}

let savedHistory = localStorage.getItem("history");

if(savedHistory){
document.getElementById("historyTable").innerHTML = savedHistory;
}
  setInterval(function(){

count--;

document.getElementById("timer").innerText =
"Next Update In: " + count + "s";

if(count <= 0){
updateResults();
}

},1000);

setInterval(updateResults,10000);

</script>

</div>

</body>
</html>
