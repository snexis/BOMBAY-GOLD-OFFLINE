<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>Bombay Gold Fatafat - Live Result</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f2f5; }
        .header { background-color: #004a99; color: white; padding: 15px; }
        table { width: 95%; margin: 20px auto; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #004a99; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Welcome to Bombay Gold Fatafat</h2>
         <h3>Today's Live Result</h3>
  <div id="displayArea"></div>

<script src="https://www.gstatic.com/firebasejs/7.20.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/7.20.0/firebase-database.js"></script>
<script>
    var firebaseConfig = { /* আপনার কনফিগারেশন */ };
    firebase.initializeApp(firebaseConfig);

    firebase.database().ref('allResults/').on('value', function(snapshot) {
        var data = snapshot.val();
        var displayArea = document.getElementById("displayArea");
        displayArea.innerHTML = ""; // আগের টেবিল ক্লিয়ার করা

        // ডাটাগুলোকে তারিখ অনুযায়ী গ্রুপ করা হচ্ছে
        var groupedData = {};
        for (var key in data) {
            var item = data[key];
            if (!groupedData[item.date]) groupedData[item.date] = [];
            groupedData[item.date].push(item);
        }

        // গ্রুপ করা ডাটাগুলো দিয়ে টেবিল তৈরি
        for (var date in groupedData) {
            var rows = groupedData[date];
            var html = `<h3>${date}</h3><table border="1"><tr><th>সময়</th><th>রেজাল্ট</th></tr>`;
            
            rows.forEach(function(r) {
                html += `<tr><td>${r.time}</td><td>${r.result}</td></tr>`;
            });
            
            html += `</table>`;
            displayArea.innerHTML += html;
        }
    });
</script>
